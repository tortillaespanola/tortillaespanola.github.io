<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPAÑOLA | Bestellung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .back-link {
            text-decoration: none;
            color: #000;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 40px;
            text-transform: uppercase;
            border-bottom: 1px solid #000;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .subtitle-main {
            font-size: 0.8rem;
            margin-bottom: 50px;
            display: block;
            opacity: 0.7;
        }

        .product-card {
            margin-bottom: 80px;
        }

        .weight-tag {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            display: inline-block;
            padding: 8px 25px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .weight-tag:hover {
            transform: scale(1.05);
        }

        .product-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            margin: 5px 0 15px 0;
            text-transform: uppercase;
        }

        .product-image {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            margin-bottom: 20px;
            display: block;
        }

        img:not([src]), img[src=""], .product-image[style*="display: none"] {
            display: none !important;
        }

        .product-lang-sub {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 15px;
            font-style: italic;
        }

        .price-tag {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
        }

        .btn-order {
            display: inline-block;
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 15px 30px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            transition: transform 0.2s ease;
        }

        .btn-order:hover {
            transform: scale(1.05);
        }

        .ingredients-section {
            margin-top: 60px;
            text-align: left;
            border-top: 1px solid #000;
            padding-top: 30px;
        }

        .ingredients-section h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .ing-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            font-size: 0.8rem;
        }

        .ing-item {
            border-bottom: 1px dotted #ccc;
            padding-bottom: 5px;
        }

        .ing-label {
            font-weight: 700;
            display: block;
            text-transform: uppercase;
            font-size: 0.7rem;
            color: #666;
        }

        .footer-note {
            margin-top: 50px;
            font-size: 0.7rem;
            line-height: 1.6;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" class="back-link">← Zurück / Back</a>

        <h1>BESTELLIG</h1>
        <span class="subtitle-main">PRE-ORDER YOUR TORTILLA</span>
