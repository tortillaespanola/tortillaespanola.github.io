<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The music behind the pans</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #0f0f0f; 
            color: #ffffff; 
            text-align: center; 
            padding: 50px 20px; 
            line-height: 1.6; 
        }
        .container { max-width: 500px; margin: auto; }
        
        .logo-main { width: 100px; margin-bottom: 20px; border-radius: 50%; }
        h1 { 
            font-size: 20px; 
            font-weight: 700; 
            margin-bottom: 50px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: #f1f1f1; 
        }
        
        /* Secciones de Playlist - Todo centrado */
        .section { 
            margin-bottom: 60px; 
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra los hijos horizontalmente */
            text-align: center; 
        }
        
        .section h2 { 
            font-size: 22px; 
            margin: 0 0 12px 0; 
            color: #fff; 
            letter-spacing: 1px;
        }
        
        .section p { 
            font-size: 14px; 
            color: #b3b3b3; 
            margin: 0 auto 25px auto; 
            font-style: italic; 
            max-width: 90%; /* Para que el texto no toque los bordes y se vea mejor */
        }

        /* Fila de iconos centrada */
        .icon-row { 
            display: flex; 
            gap: 30px; 
            justify-content: center; /* Centra los iconos en la fila */
            align-items: center; 
        }
        
        .icon-link { 
            transition: transform 0.2s, opacity 0.2s; 
            display: inline-block; 
        }
        
        .icon-link:hover { 
            transform: scale(1.15); 
            opacity: 0.8;
        }
        
        .icon-link img { 
            width: 35px; 
            height: 35px; 
        }

    </style>
</head>
<body>

    <div class="container">
        <img src="https://github.com/tortillaespanola.png" class="logo-main" alt="Logo">
        <h1>The music behind the pans</h1>

        <div class="section">
            <h2>ESPAÑOLA</h2>
            <p>This is the pulse behind the pans—the underground sounds that fueled the project and keep the kitchen alive.</p>
            <div class="icon-row">
                <a href="https://open.spotify.com/playlist/5EQHKVR6vCAg1BYUvZab5H?si=c0D7xQXuQV6uw-BsX5Rx5w" class="icon-link" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify"></a>
                <a href="https://music.youtube.com/playlist?list=PLdhZCagED9PdY27EsqFlJaiYgb8_cwEsK&si=eFvlgOeJDfqQ60Q7" class="icon-link" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube"></a>
            </div>
        </div>

        <div class="section">
            <h2>Ñ-Bonus-tracks</h2>
            <p>Data breach: The Ñ hidden B-sides. Out of place.</p>
            <div class="icon-row">
                <a href="https://open.spotify.com/playlist/2iMYMQNeT5LB7RmpBgjXag?si=1HZB5deyRiW8xMo8vshJWw" class="icon-link" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify"></a>
                <a href="LINK_YOUTUBE_2" class="icon-link" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube"></a>
            </div>
        </div>

        <div class="section">
            <h2>Ñ-Vintage</h2>
            <p>Analog soul: tapes from another Spain.</p>
            <div class="icon-row">
                <a href="https://open.spotify.com/playlist/3Ke8g1k9nlTbZRsbYfh7yg?si=brc_Mg8rTnaAP_cEf2tQ6w" class="icon-link" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify"></a>
                <a href="LINK_YOUTUBE_3" class="icon-link" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube"></a>
            </div>
        </div>

    </div>

</body>
</html>
