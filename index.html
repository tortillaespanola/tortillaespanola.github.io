<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPAÑOLA | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Space+Mono:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #000000;
            --text-secondary: #636c76;
            --border-color: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .logo-gif {
            width: 360px;
            max-width: 85%;
            height: auto;
            margin: 0 auto 30px;
            display: block;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 10vw, 4rem);
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .description {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            margin-top: 5px;
            margin-bottom: 50px;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            letter-spacing: 1px;
        }

        /* Cascada de Links */
        .links-cascade {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn-link {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700; /* Bold */
            text-decoration: none;
            color: #000;
            background: #fff;
            border: 2px solid #000;
            padding: 18px 30px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            font-size: 0.9rem;
            line-height: 1.4;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }

        .btn-link:hover {
            background: #000;
            color: #fff;
        }

        .btn-link:hover img.ws-icon {
            filter: invert(1);
        }

        /* Icono WhatsApp Blanco y Negro */
        .ws-icon {
            width: 24px;
            height: 24px;
            filter: grayscale(1) contrast(2);
        }

        .small-text {
            display: block;
            font-size: 0.7rem;
            font-weight: 400;
            margin-top: 2px;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            font-family: 'Space Mono', monospace;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.gif" alt="Logo" class="logo-gif">
        
        <h1>ESPAÑOLA</h1>
        <p class="description">--SPANISCHE TORTILLA--</p>

        <div class="links-cascade">
            
            <a href="https://wa.me/41772146639?text=Griezi!" class="btn-link" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA" class="ws-icon">
                <div>
                    DO VORBESTELLE<br>
                    <span class="small-text">PRE-ORDER YOURS NOW</span>
                </div>
            </a>

            <a href="/playlists" class="btn-link">
                <div>
                    KITCHEN'S PLAYLIST<br>
                    <span class="small-text">LISTEN WHILE YOU WAIT</span>
                </div>
            </a>

            <a href="mailto:hola@espanola.ch" class="btn-link">
                <div>
                    SCHRYB MIR UFF D'MAIL<br>
                    <span class="small-text">WRITE ME AN E-MAIL</span>
                </div>
            </a>

            <a href="/impressum" style="font-family:'Space Mono'; font-size: 0.7rem; color: #636c76; text-decoration: none; margin-top: 20px;">
                [ IMPRESSUM ]
            </a>
        </div>

        <div class="footer">
            &copy; 2026 ESPAÑOLA
        </div>
    </div>

</body>
</html>
