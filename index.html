<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tortilla Española | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-color: #f1c40f; /* Color tortilla/huevo */
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            font-size: 4rem;
            background: var(--accent-color);
            color: black;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20%;
            margin: 0 auto 20px;
            font-weight: bold;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .links-grid {
            display: grid;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .card:hover {
            border-color: var(--accent-color);
            transform: translateY(-3px);
            background: #1c2128;
        }

        .card h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
        }

        .card p {
            margin: 0;
            font-size: 0.9rem;
            text-align: left;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Ñ</div>
        <h1>tortillaespanola</h1>
        <p>Bienvenido a mi rincón digital.</p>

        <div class="links-grid">
            <a href="/playlists" class="card">
                <h3>🎵 Playlists</h3>
                <p>Mi selección musical personal y listas curadas.</p>
            </a>

            <a href="/impressum" class="card">
                <h3>⚖️ Impressum</h3>
                <p>Información legal y contacto de este sitio web.</p>
            </a>

            <a href="https://github.com/tortillaespanola" class="card" target="_blank">
                <h3>💻 GitHub</h3>
                <p>Echa un vistazo a mis repositorios y código.</p>
            </a>
        </div>

        <div class="footer">
            &copy; 2024 tortillaespanola. Hecho con ❤️ y 🥚.
        </div>
    </div>

</body>
</html>
