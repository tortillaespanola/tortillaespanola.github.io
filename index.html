<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPAÑOLA | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Space+Mono:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #000000;
            --text-secondary: #636c76;
            --border-color: #000000;
            --hover-scale: 1.05;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .logo-gif {
            width: 360px;
            max-width: 85%;
            height: auto;
            margin: 0 auto 30px;
            display: block;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 10vw, 4rem);
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .description {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            margin-top: 5px;
            margin-bottom: 50px;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            letter-spacing: 1px;
        }

        /* Cascada de Links sin Cuadro */
        .links-cascade {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .btn-link {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700; /* Bold */
            text-decoration: none;
            color: #000;
            padding: 10px 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            font-size: 1.05rem; /* Letra un pelín más grande */
            line-height: 1.3;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            
            /* Efecto suave al pasar el ratón */
            transition: transform 0.2s ease, color 0.2s ease;
        }

        /* Hover: Ligeramente más grande */
        .btn-link:hover {
            transform: scale(var(--hover-scale));
        }

        /* Ajuste específico para el link central (Kitchen's Playlist) sin cuadro */
        .btn-link.playlist {
            /* Mismo hover que el resto, solo cambia la escala y un pelín el color */
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .btn-link.playlist:hover {
            color: #333; /* Un gris muy sutil sin cambiar fondo */
        }

        /* Icono WhatsApp Lineal B&N */
        .ws-icon {
            width: 28px; /* Un pelín más grande */
            height: 28px;
            /* Filtro para asegurar que es negro puro y sin fondos raros */
            filter: brightness(0); 
            display: block;
        }
