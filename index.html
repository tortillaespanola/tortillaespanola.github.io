<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPAÑOLA | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Space+Mono:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #f6f8fa;
            --text-primary: #1f2328;
            --text-secondary: #636c76;
            --border-color: #d0d7de;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px 20px;
        }

        /* Logo 3 veces más grande */
        .logo-gif {
            width: 360px; 
            height: auto;
            margin: 0 auto 30px;
            display: block;
        }

        /* Título en Montserrat Extra Bold */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800; /* Extra Bold */
            font-size: 3.5rem;
            margin-bottom: 5px;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        /* Subtítulo en Space Mono Bold */
        .description {
            font-family: 'Space Mono', monospace;
            font-weight: 700; /* Bold */
            color: var(--text-primary);
            margin-bottom: 50px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .links-grid {
            display: grid;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 18px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .card:hover {
            border-color: #000;
            transform: translateY(-2px);
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0 0 3px 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .card p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            font-family: 'Space Mono', monospace;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.gif" alt="Logo" class="logo-gif">
        
        <h1>ESPAÑOLA</h1>
        <p class="description">--SPANISCHE TORTILLA--</p>

        <div class="links-grid">
            <a href="/playlists" class="card">
                <h3>🎵 Playlists</h3>
                <p>Selección musical y listas curadas.</p>
            </a>

            <a href="/impressum" class="card">
                <h3>⚖️ Impressum</h3>
                <p>Información legal y contacto.</p>
            </a>

            <a href="https://github.com/tortillaespanola" class="card" target="_blank">
                <h3>💻 GitHub</h3>
                <p>Repositorios y proyectos de código.</p>
            </a>
        </div>

        <div class="footer">
            &copy; 2024 ESPAÑOLA
        </div>
    </div>

</body>
</html>
